<!doctype html>
<html lang="en">
  <body style="margin: 0; padding: 0; background: #f4f4f5">
    <table
      role="presentation"
      width="100%"
      cellpadding="0"
      cellspacing="0"
      style="background: #f4f4f5; padding: 32px 16px"
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="100%"
            cellpadding="0"
            cellspacing="0"
            style="
              max-width: 480px;
              background: #ffffff;
              border: 1px solid #e4e4e7;
              border-radius: 12px;
              font-family:
                -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial,
                sans-serif;
            "
          >
            <tr>
              <td style="padding: 32px 32px 8px">
                <h1 style="margin: 0; font-size: 20px; font-weight: 700; color: #18181b">
                  Welcome to {{siteName}}
                </h1>
              </td>
            </tr>
            <tr>
              <td style="padding: 0 32px 24px; color: #52525b; font-size: 15px; line-height: 1.6;">
                <p style="margin: 0;">
                  Hey, {{name}} 👋
                </p><br>
                <p style="margin: 0;">
                  Your account is ready.<br> Thanks for signing up, we're glad you're here.
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding: 0 32px 32px">
                <a
                  href="{{appUrl}}"
                  style="
                    display: inline-block;
                    padding: 10px 18px;
                    background: #4f46e5;
                    color: #ffffff;
                    font-size: 14px;
                    font-weight: 600;
                    text-decoration: none;
                    border-radius: 8px;
                  "
                >
                  Open {{siteName}}
                </a>
              </td>
            </tr>
          </table>
          <p style="margin: 16px 0 0; font-size: 12px; color: #a1a1aa; font-family: sans-serif">
            You received this because you signed up for {{siteName}}.
          </p>
        </td>
      </tr>
    </table>
  </body>
</html>
